<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动监控仪表盘</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .stat-card {
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .chart-container {
            height: 350px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="display-5 fw-bold text-center">📊 活动监控仪表盘</h1>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card shadow-sm bg-success text-white">
                    <div class="card-body text-center py-4">
                        <h5 class="card-title mb-2">📚 今日学习记录</h5>
                        <h2 class="display-4 fw-bold" id="study-count">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card shadow-sm bg-warning text-dark">
                    <div class="card-body text-center py-4">
                        <h5 class="card-title mb-2">🎮 今日娱乐记录</h5>
                        <h2 class="display-4 fw-bold" id="entertainment-count">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card shadow-sm bg-primary text-white">
                    <div class="card-body text-center py-4">
                        <h5 class="card-title mb-2">📋 总记录数</h5>
                        <h2 class="display-4 fw-bold" id="total-count">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-light">
                <h5 class="card-title mb-0">🔍 搜索与筛选</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">活动类型</label>
                        <select id="filter-activity" class="form-select">
                            <option value="">全部</option>
                            <option value="study">学习</option>
                            <option value="entertainment">娱乐</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">关键词</label>
                        <input type="text" id="filter-keyword" class="form-control" placeholder="搜索消息或来源...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">开始日期</label>
                        <input type="date" id="filter-start" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">结束日期</label>
                        <input type="date" id="filter-end" class="form-control">
                    </div>
                    <div class="col-12">
                        <button onclick="applyFilter()" class="btn btn-primary me-2">
                            <i class="bi bi-search"></i> 搜索
                        </button>
                        <button onclick="resetFilter()" class="btn btn-secondary">
                            重置
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-light">
                        <h5 class="card-title mb-0">🍕 学习/娱乐分布</h5>
                    </div>
                    <div class="card-body">
                        <div id="pie-chart" class="chart-container"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">📈 时间趋势</h5>
                        <select id="trend-hours" class="form-select form-select-sm" style="width: 150px;" onchange="loadTrendChart()">
                            <option value="24">最近24小时</option>
                            <option value="48">最近48小时</option>
                            <option value="168">最近7天</option>
                        </select>
                    </div>
                    <div class="card-body">
                        <div id="line-chart" class="chart-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">📝 活动日志</h5>
                <button onclick="refreshData()" class="btn btn-sm btn-outline-primary">
                    🔄 刷新
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>时间戳</th>
                                <th>活动</th>
                                <th>消息</th>
                                <th>来源</th>
                            </tr>
                        </thead>
                        <tbody id="log-table-body">
                            {% for log in activity_log %}
                                <tr class="{% if log.activity == 'study' %}table-success{% elif log.activity == 'entertainment' %}table-warning{% else %}table-info{% endif %}">
                                    <td>{{ log.id }}</td>
                                    <td>{{ log.timestamp }}</td>
                                    <td>
                                        <span class="badge {% if log.activity == 'study' %}bg-success{% elif log.activity == 'entertainment' %}bg-warning text-dark{% else %}bg-info{% endif %}">
                                            {{ log.activity }}
                                        </span>
                                    </td>
                                    <td>{{ log.message }}</td>
                                    <td>{{ log.source or 'N/A' }}</td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pieChart, lineChart;

        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            loadStats();
            loadPieChart();
            loadTrendChart();
        });

        function initCharts() {
            pieChart = echarts.init(document.getElementById('pie-chart'));
            lineChart = echarts.init(document.getElementById('line-chart'));

            window.addEventListener('resize', function() {
                pieChart.resize();
                lineChart.resize();
            });
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('study-count').textContent = data.study_count;
                document.getElementById('entertainment-count').textContent = data.entertainment_count;
                document.getElementById('total-count').textContent = data.total_count;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadPieChart() {
            try {
                const response = await fetch('/api/distribution');
                const data = await response.json();
                
                const seriesData = [];
                if (data.study !== undefined) {
                    seriesData.push({ value: data.study, name: '学习' });
                }
                if (data.entertainment !== undefined) {
                    seriesData.push({ value: data.entertainment, name: '娱乐' });
                }
                if (Object.keys(data).some(k => !['study', 'entertainment'].includes(k))) {
                    for (const key in data) {
                        if (!['study', 'entertainment'].includes(key)) {
                            seriesData.push({ value: data[key], name: key });
                        }
                    }
                }

                const option = {
                    tooltip: {
                        trigger: 'item'
                    },
                    legend: {
                        orient: 'vertical',
                        left: 'left'
                    },
                    series: [
                        {
                            name: '活动分布',
                            type: 'pie',
                            radius: ['40%', '70%'],
                            itemStyle: {
                                borderRadius: 10,
                                borderColor: '#fff',
                                borderWidth: 2
                            },
                            data: seriesData,
                            color: ['#52c41a', '#faad14', '#1890ff', '#ff4d4f']
                        }
                    ]
                };

                pieChart.setOption(option);
            } catch (error) {
                console.error('Error loading pie chart:', error);
            }
        }

        async function loadTrendChart() {
            try {
                const hours = document.getElementById('trend-hours').value;
                const response = await fetch(`/api/trend?hours=${hours}`);
                const data = await response.json();

                const option = {
                    tooltip: {
                        trigger: 'axis'
                    },
                    legend: {
                        data: ['学习', '娱乐']
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        boundaryGap: false,
                        data: data.labels
                    },
                    yAxis: {
                        type: 'value'
                    },
                    series: [
                        {
                            name: '学习',
                            type: 'line',
                            data: data.study_data,
                            smooth: true,
                            itemStyle: { color: '#52c41a' },
                            areaStyle: {
                                color: {
                                    type: 'linear',
                                    x: 0, y: 0, x2: 0, y2: 1,
                                    colorStops: [
                                        { offset: 0, color: 'rgba(82, 196, 26, 0.5)' },
                                        { offset: 1, color: 'rgba(82, 196, 26, 0.1)' }
                                    ]
                                }
                            }
                        },
                        {
                            name: '娱乐',
                            type: 'line',
                            data: data.entertainment_data,
                            smooth: true,
                            itemStyle: { color: '#faad14' },
                            areaStyle: {
                                color: {
                                    type: 'linear',
                                    x: 0, y: 0, x2: 0, y2: 1,
                                    colorStops: [
                                        { offset: 0, color: 'rgba(250, 173, 20, 0.5)' },
                                        { offset: 1, color: 'rgba(250, 173, 20, 0.1)' }
                                    ]
                                }
                            }
                        }
                    ]
                };

                lineChart.setOption(option);
            } catch (error) {
                console.error('Error loading line chart:', error);
            }
        }

        async function applyFilter() {
            try {
                const activity = document.getElementById('filter-activity').value;
                const keyword = document.getElementById('filter-keyword').value;
                const startDate = document.getElementById('filter-start').value;
                const endDate = document.getElementById('filter-end').value;

                let url = '/api/search?';
                if (activity) url += `activity=${encodeURIComponent(activity)}&`;
                if (keyword) url += `keyword=${encodeURIComponent(keyword)}&`;
                if (startDate) url += `start_date=${encodeURIComponent(startDate)}&`;
                if (endDate) url += `end_date=${encodeURIComponent(endDate)}`;

                const response = await fetch(url);
                const logs = await response.json();
                renderLogTable(logs);
            } catch (error) {
                console.error('Error applying filter:', error);
            }
        }

        function resetFilter() {
            document.getElementById('filter-activity').value = '';
            document.getElementById('filter-keyword').value = '';
            document.getElementById('filter-start').value = '';
            document.getElementById('filter-end').value = '';
            location.reload();
        }

        function renderLogTable(logs) {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = '';

            logs.forEach(log => {
                const tr = document.createElement('tr');
                let rowClass = 'table-info';
                if (log.activity === 'study') rowClass = 'table-success';
                else if (log.activity === 'entertainment') rowClass = 'table-warning';
                tr.className = rowClass;

                tr.innerHTML = `
                    <td>${log.id}</td>
                    <td>${log.timestamp}</td>
                    <td>
                        <span class="badge ${log.activity === 'study' ? 'bg-success' : log.activity === 'entertainment' ? 'bg-warning text-dark' : 'bg-info'}">
                            ${log.activity}
                        </span>
                    </td>
                    <td>${log.message}</td>
                    <td>${log.source || 'N/A'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function refreshData() {
            loadStats();
            loadPieChart();
            loadTrendChart();
        }

        setInterval(refreshData, 30000);
    </script>
</body>
</html>
