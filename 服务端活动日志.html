<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务端活动日志</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <h1>活动日志</h1>
    <table>
        <thead>
            <tr>
                <th>活动</th>
                <th>消息</th>
            </tr>
        </thead>
        <tbody>
            {% for log in activity_log %}
                <tr>
                    <td>{{ log.activity }}</td>
                    <td>{{ log.message }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
